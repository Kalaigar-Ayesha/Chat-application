name: "CI/CD Pipeline"

# This workflow builds the frontend and backend, then deploys the
# application to a remote Linux server running Docker + nginx via SSH.

on:
  push:
    branches: [ main ]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build and Test
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Debug - Check working directory
        run: |
          echo "Current directory:"
          pwd
          echo "Directory contents:"
          ls -la
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version

      - name: Install backend dependencies
        run: |
          set -e
          cd backend
          npm ci

      # optional: run backend tests if you have any
      - name: Run backend tests
        run: |
          set -e
          cd backend
          if [ -f package.json ] && npm run | grep -q test; then
            npm test
          else
            echo "no backend tests defined"
          fi

      - name: Install frontend dependencies
        run: |
          set -e
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          set -e
          cd frontend
          npm run build

      # front-end linting (optional)
      - name: Lint frontend
        run: |
          set -e
          cd frontend
          if npm run | grep -q lint; then
            npm run lint || true
          fi

  deploy:
    name: Deploy to server
    runs-on: self-hosted
    needs: build
    environment: production

    steps:
      - name: Checkout code again
        uses: actions/checkout@v4

      # transfer entire repo (including generated build folder) to remote
      - name: Copy sources to remote host
        uses: appleboy/scp-action@v0.1.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "./"
          target: ${{ secrets.SERVER_PROJECT_PATH }}

      # run deployment commands over ssh
      - name: SSH and run docker-compose
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.SERVER_PROJECT_PATH }}
            # if the repo already exists, update it; otherwise it was just
            # written by the previous SCP step
            if [ -d .git ]; then
              git reset --hard HEAD
              git clean -ffdx
            fi

            # bring up the stack with latest code and images
            docker-compose pull || true
            docker-compose up -d --build --remove-orphans

            # note: nginx is running inside the frontend container; the
            # remote server simply needs Docker/Compose

      - name: Deployment notification
        run: echo "✅ Deployment to ${{ secrets.SERVER_HOST }} completed successfully."
