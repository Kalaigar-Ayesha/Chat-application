name: "CI/CD Pipeline"

on:
  push:
    branches: [ main ]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build and Test
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Debug - Check working directory
        run: |
          echo "Current directory:"
          pwd
          echo "Directory contents:"
          ls -la
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version

      - name: Install backend dependencies
        run: |
          set -e
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          set -e
          cd backend
          if [ -f package.json ] && npm run | grep -q test; then
            npm test
          else
            echo "no backend tests defined"
          fi

      - name: Install frontend dependencies
        run: |
          set -e
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          set -e
          cd frontend
          npm run build

      - name: Lint frontend
        run: |
          set -e
          cd frontend
          if npm run | grep -q lint; then
            npm run lint || true
          fi

  deploy:
    name: Deploy Locally with Docker Compose
    runs-on: self-hosted
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stop existing containers
        run: |
          docker compose down || true

      - name: Build and start containers
        run: |
          docker compose up -d --build --remove-orphans

      - name: Show running containers
        run: docker ps