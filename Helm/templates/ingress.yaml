apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "chatapp.fullname" . }}-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: chatapp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "chatapp.fullname" . }}-frontend
            port:
              number: 80